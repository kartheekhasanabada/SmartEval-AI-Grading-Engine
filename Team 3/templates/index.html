<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartEval Master Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 50px 20px;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            background-attachment: fixed;
            color: #1d1d1f;
        }
        .glass-box {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: left;
        }
        .top-bar {
            max-width: 400px;
            margin: 0 auto 10px;
            display: flex;
            justify-content: flex-end;
        }
        .logout-btn {
            text-decoration: none;
            color: #fff;
            background: rgba(0, 0, 0, 0.35);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
        }
        h2 {
            text-align: center;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 30px;
            color: #1d1d1f;
        }
        .form-group {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }
        .form-group:last-of-type {
            border-bottom: none;
            margin-bottom: 10px;
        }
        label.title {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
            font-size: 16px;
        }
        p.help-text {
            font-size: 13px;
            color: #555;
            margin-top: 0;
            margin-bottom: 15px;
        }
        input[type="file"] {
            display: none;
        }
        .ios-button {
            display: block;
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.6);
            color: #007aff;
            border: 1px solid rgba(0, 122, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            text-align: center;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .ios-button:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: #007aff;
        }
        .file-name {
            display: block;
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            text-align: center;
            word-wrap: break-word;
        }
        input[type="submit"] {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 600;
            transition: 0.3s;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        input[type="submit"]:hover:not(:disabled) {
            background-color: #0056b3;
        }
        input[type="submit"]:disabled {
            background-color: #cccccc;
            color: #888888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .status {
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a class="logout-btn" href="/logout">Logout</a>
    </div>
    <div class="glass-box">
        <h2>Teacher Upload Portal</h2>
        <form action="/teacher/upload" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label class="title">1. Upload Model Answer Key</label>
                <p class="help-text">Upload handwritten key as image/PDF. Team 1 OCR will convert it to JSON.</p>
                <label class="ios-button" for="answer_key">Choose Key Image/PDF</label>
                <input type="file" id="answer_key" name="answer_key" accept=".png,.jpg,.jpeg,.pdf">
                <span class="file-name" id="key_filename">No file selected</span>
            </div>

            <div class="form-group">
                <label class="title">2. Upload Student Answer Sheet</label>
                <p class="help-text">Upload image or PDF. Team 1 OCR will scan it automatically.</p>
                <label class="ios-button" for="student_sheet">Choose Sheet Image/PDF</label>
                <input type="file" id="student_sheet" name="student_sheet" accept=".png,.jpg,.jpeg,.pdf">
                <span class="file-name" id="sheet_filename">No file selected</span>
            </div>

            <input type="submit" id="upload_button" value="Run Full AI Grading Pipeline">
        </form>
    </div>

    <script>
        const submitBtn = document.getElementById("upload_button");
        const validSheetExt = [".png", ".jpg", ".jpeg", ".pdf"];

        function updateFilename(inputId, textId, allowedExt) {
            const input = document.getElementById(inputId);
            const textDisplay = document.getElementById(textId);
            if (input.files && input.files.length > 0) {
                const fileName = input.files[0].name;
                const isValid = allowedExt.some(ext => fileName.toLowerCase().endsWith(ext));
                if (!isValid) {
                    textDisplay.innerHTML = "Error: Invalid file type.";
                    textDisplay.style.color = "#ff3b30";
                    input.value = "";
                    submitBtn.disabled = true;
                    submitBtn.value = "Fix Errors to Upload";
                    return;
                }
                textDisplay.innerHTML = "<b>" + fileName + "</b>";
                textDisplay.style.color = "#007aff";
                submitBtn.disabled = false;
                submitBtn.value = "Upload & Grade";
            } else {
                textDisplay.innerHTML = "No file selected";
                textDisplay.style.color = "#555";
            }
        }

        document.getElementById("answer_key").addEventListener("change", function () {
            updateFilename("answer_key", "key_filename", validSheetExt);
        });
        document.getElementById("student_sheet").addEventListener("change", function () {
            updateFilename("student_sheet", "sheet_filename", validSheetExt);
        });
    </script>
</body>
</html>
